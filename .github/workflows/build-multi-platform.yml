name: Build Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      linux:
        description: "Build Linux"
        required: false
        default: true
        type: boolean
      macos:
        description: "Build macOS (Universal)"
        required: false
        default: true
        type: boolean
      windows:
        description: "Build Windows"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  APP_NAME: DeskForge
  APP_SLUG: deskforge

jobs:
  build-linux:
    if: github.event_name == 'push' || inputs.linux == true
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            rpm \
            fakeroot

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux packages
        run: pnpm tauri build --target x86_64-unknown-linux-gnu
        env:
          TAURI_BUNDLE_APPIMAGE: "true"
          TAURI_BUNDLE_DEB: "true"
          TAURI_BUNDLE_RPM: "true"

      - name: Rename Linux AppImage
        run: |
          cd src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage
          for file in *.AppImage; do
            mv "$file" "${APP_NAME}_${GITHUB_REF_NAME}-linux-x86_64.AppImage"
          done

      - name: Rename Linux DEB
        run: |
          cd src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb
          for file in *.deb; do
            mv "$file" "${APP_NAME}_${GITHUB_REF_NAME}-linux-x86_64.deb"
          done

      - name: Rename Linux RPM
        run: |
          cd src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm
          for file in *.rpm; do
            mv "$file" "${APP_NAME}_${GITHUB_REF_NAME}-linux-x86_64.rpm"
          done

      - name: Upload Linux AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-${{ github.ref_name }}-linux-x86_64-appimage
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Upload Linux DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-${{ github.ref_name }}-linux-x86_64-deb
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload Linux RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-${{ github.ref_name }}-linux-x86_64-rpm
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          retention-days: 30

  build-macos:
    if: github.event_name == 'push' || inputs.macos == true
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS Universal bundle
        run: pnpm tauri build --target universal-apple-darwin
        env:
          TAURI_BUNDLE_DMG: "true"
          TAURI_BUNDLE_MACOS: "true"

      - name: Rename macOS DMG
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for file in *.dmg; do
            mv "$file" "${APP_NAME}_${GITHUB_REF_NAME}-macos-universal.dmg"
          done

      - name: Zip macOS App Bundle
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/macos
          zip -r "${APP_NAME}_${GITHUB_REF_NAME}-macos-universal.app.zip" "${APP_NAME}.app"

      - name: Upload macOS DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-${{ github.ref_name }}-macos-universal-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload macOS App Bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-${{ github.ref_name }}-macos-universal-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.zip
          retention-days: 30

  build-windows:
    if: github.event_name == 'push' || inputs.windows == true
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundles
        run: pnpm tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_BUNDLE_NSIS: "true"
          TAURI_BUNDLE_MSI: "true"

      - name: Rename Windows NSIS
        shell: pwsh
        run: |
          cd src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
          foreach ($file in Get-ChildItem *.exe) {
            Rename-Item -Path $file.Name -NewName ("{0}_{1}-windows-x86_64-setup.exe" -f $env:APP_NAME, $env:GITHUB_REF_NAME)
          }

      - name: Rename Windows MSI
        shell: pwsh
        run: |
          cd src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi
          foreach ($file in Get-ChildItem *.msi) {
            Rename-Item -Path $file.Name -NewName ("{0}_{1}-windows-x86_64.msi" -f $env:APP_NAME, $env:GITHUB_REF_NAME)
          }

      - name: Upload Windows NSIS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-${{ github.ref_name }}-windows-x86_64-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload Windows MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-${{ github.ref_name }}-windows-x86_64-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifact tree
        run: ls -R artifacts

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeskForge ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
