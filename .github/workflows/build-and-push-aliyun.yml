name: Build and Push DeskForge to Aliyun OSS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      windows:
        description: "Build DeskForge Windows desktop bundle"
        required: false
        default: true
        type: boolean
      upload:
        description: "Upload release artifacts to Aliyun OSS"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  APP_NAME: DeskForge
  APP_SLUG: deskforge
  OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
  OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
  ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

jobs:
  build-windows:
    name: Build Windows Bundle
    if: github.event_name == 'push' || inputs.windows == true
    runs-on: windows-latest
    outputs:
      version: ${{ steps.prep.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Windows bundle
        run: pnpm tauri build

      - name: Prepare release payload
        id: prep
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME) {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = "manual-$($env:GITHUB_RUN_NUMBER)-$($env:GITHUB_SHA.Substring(0,7))"
          }

          $releaseDir = Join-Path $env:RUNNER_TEMP "release"
          $bundleDir = "src-tauri/target/release/bundle"
          $appDir = Join-Path $releaseDir "windows"

          New-Item -ItemType Directory -Force -Path $appDir | Out-Null
          Copy-Item -Path $bundleDir\* -Destination $appDir -Recurse -Force

          $checksums = @()
          Get-ChildItem -Path $appDir -Recurse -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            $relative = $_.FullName.Substring($releaseDir.Length + 1).Replace('\\', '/')
            $checksums += "$($hash.Hash.ToLower())  $relative"
          }

          Set-Content -Path (Join-Path $releaseDir "checksums.txt") -Value $checksums

          $metadata = @{
            app = $env:APP_NAME
            slug = $env:APP_SLUG
            version = $version
            run_id = $env:GITHUB_RUN_ID
            commit = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            built_at_utc = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          } | ConvertTo-Json -Depth 4

          Set-Content -Path (Join-Path $releaseDir "build-metadata.json") -Value $metadata

          "version=$version" >> $env:GITHUB_OUTPUT
          "release_dir=$releaseDir" >> $env:GITHUB_OUTPUT

      - name: Upload GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskforge-windows-${{ steps.prep.outputs.version }}
          path: ${{ steps.prep.outputs.release_dir }}
          if-no-files-found: error
          retention-days: 14

  upload-aliyun:
    name: Upload to Aliyun OSS
    if: (github.event_name == 'push' || inputs.upload == true) && needs.build-windows.result == 'success'
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: deskforge-windows-${{ needs.build-windows.outputs.version || github.ref_name }}
          path: release
        continue-on-error: true

      - name: Download release artifact by wildcard fallback
        if: ${{ !hashFiles('release/**') }}
        uses: actions/download-artifact@v4
        with:
          pattern: deskforge-windows-*
          path: release
          merge-multiple: true

      - name: Validate OSS secrets
        run: |
          set -euo pipefail
          test -n "${ALIYUN_ACCESS_KEY_ID}"
          test -n "${ALIYUN_ACCESS_KEY_SECRET}"
          test -n "${OSS_BUCKET}"
          test -n "${OSS_ENDPOINT}"

      - name: Install ossutil
        run: |
          set -euo pipefail
          curl -fsSL https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64 -o ossutil64
          chmod +x ossutil64

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload release bundle to OSS
        run: |
          set -euo pipefail
          ./ossutil64 config \
            -e "${OSS_ENDPOINT}" \
            -i "${ALIYUN_ACCESS_KEY_ID}" \
            -k "${ALIYUN_ACCESS_KEY_SECRET}" \
            -L CH \
            -c ossutilconfig

          ./ossutil64 cp -r \
            release/ \
            "oss://${OSS_BUCKET}/desktop/${APP_SLUG}/releases/${{ steps.version.outputs.value }}/" \
            -u \
            -c ossutilconfig

  github-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build-windows.result == 'success'
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: deskforge-windows-${{ needs.build-windows.outputs.version }}
          path: release

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=()
          for pattern in \
            "release/**/*.msi" \
            "release/**/*.exe" \
            "release/**/*.zip" \
            "release/**/*.nsis.zip" \
            "release/**/*.app.tar.gz" \
            "release/**/*.dmg" \
            "release/**/*.AppImage" \
            "release/**/*.deb" \
            "release/**/*.rpm" \
            "release/checksums.txt" \
            "release/build-metadata.json"
          do
            for file in $pattern; do
              if [ -f "$file" ]; then
                files+=("$file")
              fi
            done
          done

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found." >&2
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DeskForge ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.collect.outputs.files }}

  notify:
    name: Build Complete
    if: always()
    needs: [build-windows, upload-aliyun, github-release]
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          echo "Windows Build: ${{ needs.build-windows.result }}"
          echo "Aliyun Upload: ${{ needs.upload-aliyun.result }}"
          echo "GitHub Release: ${{ needs.github-release.result }}"
